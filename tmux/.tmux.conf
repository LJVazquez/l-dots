#-------------------------------------------------------------------------------
#-- 1. SOPORTE DE COLOR & INTEGRACIÓN CON NEOVIM 
#-------------------------------------------------------------------------------
# Asegura que Neovim muestre los colores reales 
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Desactivar el delay al presionar ESC 
set -s escape-time 0

#-------------------------------------------------------------------------------
#-- 2. CONFIGURACIÓN GENERAL
#-------------------------------------------------------------------------------
# Cambiar el prefijo de Ctrl+b a Ctrl+a (mucho más ergonómico)
unbind C-b
set -g prefix C-a 
bind C-a send-prefix

# Habilitar el mouse (para hacer scroll con la rueda y redimensionar paneles)
set -g mouse on

# Empezar la numeración de ventanas y paneles en 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Aumentar el historial de scrollback
set -g history-limit 50000

# Recargar el archivo de configuración con Prefix + r
bind r source-file ~/.tmux.conf \; display "¡Configuración recargada!"

# Cerrar el panel seleccionado inmediatamente sin pedir confirmación (y/n)
bind x kill-pane

#-------------------------------------------------------------------------------
#-- 3. NAVEGACIÓN ENTRE PANELES (Prefix + Flechas)
#-------------------------------------------------------------------------------
bind Up select-pane -U
bind Down select-pane -D
bind Left select-pane -L
bind Right select-pane -R

#-------------------------------------------------------------------------------
#-- 4. SPLITS & TOGGLE TERMINAL
#-------------------------------------------------------------------------------
# Split vertical (panel al lado derecho) con Prefix + v
bind v split-window -h -p 30 -c "#{pane_current_path}"

# Split horizontal estándar (panel abajo 50/50) con Prefix + v
bind h split-window -v -c "#{pane_current_path}"

# TOGGLE INTELIGENTE: Terminal abajo (30%) con Prefix + j
# Si hay más de 1 panel, cierra el de abajo. Si hay solo 1, lo crea.
bind j if-shell -F '#{e|>:#{window_panes},1}' \
    'kill-pane -t bottom' \
    'split-window -v -p 30 -c "#{pane_current_path}"'
